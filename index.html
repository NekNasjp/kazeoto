<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Call of J</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --sub:     #8b949e;
      --accent:  #f0a040;
      --green:   #3fb950;
      --muted:   #21262d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }

    #app { min-height: 100dvh; display: flex; flex-direction: column; }

    /* ── header ── */
    header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; }
    .hdr-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sub); }
    .hdr-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    header h1 { font-size: 15px; font-weight: 500; color: var(--sub); letter-spacing: .04em; }
    #app-ver { font-size: 10px; color: var(--sub); opacity: .6; margin-left: 4px; }

    /* ── main ── */
    main { flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 24px 20px; gap: 20px; }

    /* ── standby ── */
    #standby { text-align: center; }
    .standby-ring { width: 64px; height: 64px; border-radius: 50%;
      border: 2px solid var(--border); margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center; }
    .standby-ring svg { opacity: .3; }
    #standby p { color: var(--sub); font-size: 13px; }

    /* ── sensor panel ── */
    #panel { display: none; width: 100%; max-width: 420px; }
    .panel-head { background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px 12px 0 0; padding: 16px 18px; }
    .panel-title { font-size: 18px; font-weight: 600; letter-spacing: .02em; margin-bottom: 6px; }
    .panel-meta { font-size: 12px; color: var(--sub); display: flex; gap: 12px; flex-wrap: wrap; }
    .panel-meta span { display: flex; align-items: center; gap: 4px; }

    .bets-box { background: var(--muted); border: 1px solid var(--border);
      border-top: none; padding: 14px 18px; }
    .bets-label { font-size: 11px; color: var(--sub); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 8px; }
    .bets-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .bets-list li { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums;
      letter-spacing: .04em; color: var(--accent); }

    .odds-box { background: var(--surface); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 12px 12px; padding: 16px 18px; }
    .odds-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
    .odds-label { font-size: 12px; color: var(--sub); white-space: nowrap; }
    .odds-input { flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 16px;
      outline: none; -webkit-appearance: none; }
    .odds-input:focus { border-color: var(--accent); }
    .btn-judge { width: 100%; padding: 12px; background: var(--accent); color: #000;
      font-size: 15px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; }
    #verdict { margin-top: 10px; text-align: center; font-size: 15px; font-weight: 600;
      min-height: 22px; }
    .verdict-ok  { color: var(--green); }
    .verdict-ng  { color: var(--sub); }

    /* ── notif button ── */
    #notif-bar { padding: 12px 20px 20px; }
    #btn-notif { width: 100%; max-width: 420px; display: block; margin: 0 auto;
      padding: 11px; background: var(--muted); border: 1px solid var(--border);
      border-radius: 8px; color: var(--sub); font-size: 13px; cursor: pointer; }
    #btn-notif.subscribed { color: var(--green); border-color: var(--green); }

    /* ── debug log ── */
    #dbg-wrap { padding: 0 20px 20px; max-width: 460px; margin: 0 auto; width: 100%; }
    #dbg-toggle { width: 100%; padding: 8px; background: #000; border: 1px solid #333;
      border-radius: 6px 6px 0 0; color: #555; font-size: 11px; cursor: pointer;
      text-align: left; display: flex; justify-content: space-between; }
    #dbg-toggle.open { border-bottom: none; color: #888; }
    #dbg-log { display: none; background: #000; border: 1px solid #333; border-top: none;
      border-radius: 0 0 6px 6px; padding: 8px; height: 180px; overflow-y: auto;
      font-size: 10px; font-family: monospace; color: #0f0; word-break: break-all; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="hdr-dot" id="hdr-dot"></div>
    <h1>Call of J<span id="app-ver">v1.0.14</span></h1>
  </header>

  <main>
    <div id="standby">
      <div class="standby-ring">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="9"/><line x1="12" y1="7" x2="12" y2="12"/>
          <line x1="12" y1="12" x2="15" y2="15"/>
        </svg>
      </div>
      <p>待機中</p>
    </div>

    <div id="panel">
      <div class="panel-head">
        <div class="panel-title" id="panel-title">⚡ センサー発動</div>
        <div class="panel-meta">
          <span id="meta-bank"></span>
          <span id="meta-wind"></span>
          <span id="meta-tenun"></span>
        </div>
      </div>
      <div class="bets-box">
        <div class="bets-label">買い目</div>
        <ul class="bets-list" id="bets-list"></ul>
      </div>
      <div class="odds-box">
        <div class="odds-row">
          <span class="odds-label">三連複オッズ</span>
          <input class="odds-input" type="number" id="odds-input"
            inputmode="decimal" step="0.1" min="0" placeholder="例: 12.5">
        </div>
        <button class="btn-judge" id="btn-judge">判定</button>
        <div id="verdict"></div>
      </div>
    </div>
  </main>

  <div id="notif-bar">
    <button id="btn-notif">🔔 通知を有効にする</button>
  </div>
  <div id="dbg-wrap">
    <button id="dbg-toggle">🔍 Debug Log <span id="dbg-arrow">▶</span></button>
    <div id="dbg-log"></div>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzKUiV65eD8jGzpJm5fLtQ-u1J7mhDed1hoSMHBxQyxVektoGjgUDXteH8s5AxRGaDc/exec';

  // ── Debug Log ──
  function dbg(msg) {
    const el = document.getElementById('dbg-log');
    if (!el) return;
    const t = new Date().toLocaleTimeString('ja-JP', { hour12: false });
    el.textContent = `[${t}] ${msg}\n` + el.textContent;
  }
  document.getElementById('dbg-toggle').addEventListener('click', () => {
    const log = document.getElementById('dbg-log');
    const arrow = document.getElementById('dbg-arrow');
    const btn = document.getElementById('dbg-toggle');
    const open = log.style.display === 'block';
    log.style.display = open ? 'none' : 'block';
    arrow.textContent = open ? '▶' : '▼';
    btn.classList.toggle('open', !open);
  });

  // ── SW登録 ──
  async function initSW() {
    if (!('serviceWorker' in navigator)) return;
    try {
      await navigator.serviceWorker.register('./sw.js');
      dbg('SW registration OK');
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'SENSOR_HIT') {
          dbg(`SENSOR_HIT: ${JSON.stringify(e.data.data)}`);
          showPanel(e.data.data);
        }
        if (e.data?.type === 'DBG') {
          const d = e.data;
          dbg(`[SW] ${d.msg}${d.active !== undefined ? ` active=${d.active}` : ''}${d.ts ? ` ts=${d.ts}` : ''}${d.bank ? ` bank=${d.bank}` : ''}${d.err ? ` err=${d.err}` : ''}`);
        }
      });
      // 通知タップ起動チェック: GAS 最新データが10分以内なら発動パネルを表示
      try {
        const res  = await fetch(`${GAS_URL}?action=latest&t=${Date.now()}`);
        const data = await res.json();
        dbg(`latest: active=${data.active} ts=${data.ts} bank=${data.bank}`);
        if (data.active && data.ts && (Date.now() - new Date(data.ts).getTime() < 10 * 60 * 1000)) {
          showPanel(data);
        }
      } catch (err) {
        dbg(`latest fetch error: ${err}`);
      }
    } catch (err) {
      dbg(`SW registration FAIL: ${err}`);
    }
  }

  // ── Push購読 ──
  const VAPID_PUBLIC_KEY = 'BO13tsTjl2y_vuX84DIzUbbWUgndqDKnvi7CF-9kkeK5ZBjeTRck4m5X8zKFLgN_-8erCil_UC4Ei1tE5fgmM-M';

  function urlB64ToUint8Array(b64) {
    const pad = b64 + '==='.slice((b64.length + 3) % 4);
    const raw = atob(pad.replace(/-/g, '+').replace(/_/g, '/'));
    return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
  }

  async function subscribe() {
    if (!('PushManager' in window)) { alert('このブラウザはプッシュ通知未対応です'); return; }
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { alert('通知を許可してください'); return; }

    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      try {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
        });
        dbg(`subscribed: ...${sub.endpoint.slice(-20)}`);
      } catch (err) {
        dbg(`subscribe FAIL: ${err}`);
        return;
      }
    } else {
      dbg(`existing sub: ...${sub.endpoint.slice(-20)}`);
    }

    const json = sub.toJSON();
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'subscribe',
          endpoint: json.endpoint,
          p256dh:   json.keys.p256dh,
          auth:     json.keys.auth,
        }),
        headers: { 'Content-Type': 'text/plain' },
      });
      const text = await res.text();
      dbg(`GAS POST ${res.status}: ${text.slice(0, 80)}`);
    } catch (err) {
      dbg(`GAS POST error: ${err}`);
    }

    const btn = document.getElementById('btn-notif');
    btn.textContent = '✅ 通知有効';
    btn.classList.add('subscribed');
  }

  // ── センサー発動表示 ──
  function showPanel(data) {
    document.getElementById('standby').style.display  = 'none';
    document.getElementById('panel').style.display    = 'block';
    document.getElementById('hdr-dot').classList.add('active');

    const raceLabel = data.raceNo ? `${data.bank}  ${data.raceNo}R` : data.bank;
    document.getElementById('panel-title').textContent = `⚡ ${raceLabel}`;
    document.getElementById('meta-bank').textContent   = data.bank  || '';
    document.getElementById('meta-wind').textContent  = `風 ${data.wind}m/s`;
    document.getElementById('meta-tenun').textContent = `天運 ${data.tenun}`;

    const ul = document.getElementById('bets-list');
    ul.innerHTML = '';
    (data.bets || []).forEach(b => {
      const li = document.createElement('li');
      li.textContent = b;
      ul.appendChild(li);
    });
  }

  // ── 判定ロジック ──
  document.getElementById('btn-judge').addEventListener('click', () => {
    const odds = parseFloat(document.getElementById('odds-input').value);
    const verdict = document.getElementById('verdict');
    if (isNaN(odds) || odds <= 0) { verdict.textContent = ''; return; }
    const threshold = odds * 9;
    // 仮のactual三連単オッズは別途取得不要（目安を表示）
    verdict.innerHTML = `三連単目安: <strong>${threshold.toFixed(1)}倍</strong>`;
    // 購入判定（三連単オッズが閾値以上かどうかはユーザーが判断）
    verdict.classList.remove('verdict-ok', 'verdict-ng');
  });

  // ── 初期化 ──
  initSW();
  document.getElementById('btn-notif').addEventListener('click', subscribe);

  navigator.serviceWorker?.ready.then(async reg => {
    if (Notification.permission !== 'granted') return;
    let sub = await reg.pushManager.getSubscription();
    if (sub) {
      dbg(`existing sub reused: ...${sub.endpoint.slice(-20)}`);
    } else {
      try {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
        });
        dbg(`auto-sub new: ...${sub.endpoint.slice(-20)}`);
      } catch (err) {
        dbg(`auto-sub FAIL: ${err}`);
        return;
      }
    }
    const btn = document.getElementById('btn-notif');
    btn.textContent = '✅ 通知有効';
    btn.classList.add('subscribed');
    const json = sub.toJSON();
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'subscribe', endpoint: json.endpoint, p256dh: json.keys.p256dh, auth: json.keys.auth }),
        headers: { 'Content-Type': 'text/plain' },
      });
      const text = await res.text();
      dbg(`auto-sub GAS POST ${res.status}: ${text.slice(0, 80)}`);
    } catch (err) {
      dbg(`auto-sub GAS POST error: ${err}`);
    }
  });
</script>
</body>
</html>
